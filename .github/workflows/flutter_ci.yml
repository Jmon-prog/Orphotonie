# ============================================================
# .github/workflows/flutter_ci.yml
# CI/CD GitHub Actions — Analyse, Tests et Build web Flutter
# Déclenché sur push et pull_request vers main et develop.
# ============================================================

name: Flutter CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze_and_test:
    name: Analyse & Tests
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Configurer Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable
          cache: true

      - name: Installer les dépendances
        working-directory: orphotonie
        run: flutter pub get

      - name: Analyse statique (flutter analyze)
        working-directory: orphotonie
        run: flutter analyze --fatal-infos

      - name: Tests unitaires et widgets
        working-directory: orphotonie
        run: flutter test --coverage

      - name: Publier la couverture (Codecov)
        uses: codecov/codecov-action@v4
        with:
          files: orphotonie/coverage/lcov.info
          flags: flutter
        # Ne bloque pas le CI si Codecov est absent
        continue-on-error: true

  build_web:
    name: Build Web
    runs-on: ubuntu-latest
    needs: analyze_and_test

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Configurer Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable
          cache: true

      - name: Installer les dépendances
        working-directory: orphotonie
        run: flutter pub get

      - name: Build web (production)
        working-directory: orphotonie
        run: flutter build web --release --no-pub --base-href "/Orphotonie/"

      - name: Archiver l'artefact web
        uses: actions/upload-artifact@v4
        with:
          name: orphotonie-web-${{ github.sha }}
          path: orphotonie/build/web/
          retention-days: 14

      - name: Déployer sur GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: orphotonie/build/web
          cname: ""
